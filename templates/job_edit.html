{% extends 'base.html' %}
{% block content %}
<h3>Edit Job #{{ job.id }}</h3>
<form method="post" class="row g-3">
  <div class="col-md-4"><label class="form-label">Site</label>
    <select name="site_id" class="form-select">{% for s in sites %}<option value="{{ s.id }}" {% if s.id==job.site_id %}selected{% endif %}>{{ s.name }}</option>{% endfor %}</select>
  </div>
  <div class="col-md-4"><label class="form-label">Pay period</label>
    <select name="pay_period_id" class="form-select"><option value="">--</option>{% for p in pay_periods %}<option value="{{ p.id }}" {% if p.id==job.pay_period_id %}selected{% endif %}>{{ p.name }}</option>{% endfor %}</select>
  </div>
  <div class="col-md-4"><label class="form-label">Job date</label><input type="date" name="job_date" value="{{ job.job_date }}" class="form-control" /></div>
  <div class="col-md-6"><label class="form-label">Container ref</label><input name="container_ref" value="{{ job.container_ref }}" class="form-control" /></div>
  <div class="col-md-6"><label class="form-label">Containers</label><input type="number" min="1" name="containers_unloaded" value="{{ job.containers_unloaded }}" class="form-control" /></div>
  <div class="col-md-6"><label class="form-label">Override rate (owner only use)</label><input type="number" step="0.01" name="override_rate" value="{{ job.override_rate or '' }}" class="form-control" /></div>
  <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control">{{ job.notes or '' }}</textarea></div>
  <div class="col-12"><label class="form-label">Issue notes</label><textarea name="issue_notes" class="form-control">{{ job.issue_notes or '' }}</textarea></div>
  <div class="col-12"><button class="btn btn-primary">Save</button></div>
</form>
{% endblock %}
