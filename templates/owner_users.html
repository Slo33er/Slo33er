{% extends 'base.html' %}
{% block content %}
<h3>User Management</h3>
<form method="post" class="row g-2 mb-4">
  <div class="col-md-3"><input class="form-control" name="username" placeholder="username" required /></div>
  <div class="col-md-3"><input class="form-control" name="password" placeholder="password" required /></div>
  <div class="col-md-3"><select class="form-select" name="role"><option>worker</option><option>admin</option><option>owner</option></select></div>
  <div class="col-md-3"><button class="btn btn-primary">Create User</button></div>
</form>
<table class="table table-sm table-striped">
  <thead><tr><th>ID</th><th>Username</th><th>Role</th><th>Active</th><th>Action</th></tr></thead>
  <tbody>
  {% for u in users %}
  <tr><td>{{ u.id }}</td><td>{{ u.username }}</td><td>{{ u.role }}</td><td>{{ u.active }}</td><td><form method="post" action="{{ url_for('toggle_user', user_id=u.id) }}"><button class="btn btn-sm btn-outline-secondary">Toggle</button></form></td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
