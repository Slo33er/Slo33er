{% extends 'base.html' %}
{% block content %}
<h3>Rate Table Management</h3>
<form method="post" class="row g-2 mb-4">
  <div class="col-md-6"><input name="label" class="form-control" placeholder="label" required /></div>
  <div class="col-md-4"><input type="number" step="0.01" name="rate_per_container" class="form-control" placeholder="rate" required /></div>
  <div class="col-md-2"><button class="btn btn-primary">Add Rate</button></div>
</form>
<table class="table table-sm table-striped"><thead><tr><th>Label</th><th>Rate/container</th><th>Active</th></tr></thead><tbody>{% for r in rates %}<tr><td>{{ r.label }}</td><td>${{ '%.2f'|format(r.rate_per_container) }}</td><td>{{ r.active }}</td></tr>{% endfor %}</tbody></table>
{% endblock %}
