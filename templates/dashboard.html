{% extends 'base.html' %}
{% block content %}
<h2>Welcome, {{ user.username }}</h2>
<p class="text-muted">Role: <strong>{{ user.role|upper }}</strong></p>
<div class="row g-3 mb-4">
  <div class="col-md-3"><div class="card"><div class="card-body">Container Jobs: <strong>{{ job_count }}</strong></div></div></div>
  <div class="col-md-3"><div class="card"><div class="card-body">Toolbox Meetings: <strong>{{ toolbox_count }}</strong></div></div></div>
</div>
<div class="d-flex gap-2">
  <a href="{{ url_for('new_job') }}" class="btn btn-primary">Submit Container Job</a>
  <a href="{{ url_for('new_toolbox') }}" class="btn btn-outline-primary">Submit Toolbox Meeting</a>
</div>
{% endblock %}
