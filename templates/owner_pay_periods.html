{% extends 'base.html' %}
{% block content %}
<h3>Pay Period Management</h3>
<form method="post" class="row g-2 mb-4">
  <div class="col-md-4"><input name="name" class="form-control" placeholder="period name" required /></div>
  <div class="col-md-3"><input type="date" name="start_date" class="form-control" required /></div>
  <div class="col-md-3"><input type="date" name="end_date" class="form-control" required /></div>
  <div class="col-md-2"><button class="btn btn-primary">Add Period</button></div>
</form>
<table class="table table-sm table-striped">
  <thead><tr><th>Name</th><th>Start</th><th>End</th><th>Locked</th><th>Action</th></tr></thead>
  <tbody>
  {% for p in periods %}
    <tr>
      <td>{{ p.name }}</td><td>{{ p.start_date }}</td><td>{{ p.end_date }}</td><td>{{ p.is_locked }}</td>
      <td><form method="post" action="{{ url_for('toggle_pay_period', period_id=p.id) }}"><button class="btn btn-sm btn-outline-secondary">Toggle Lock</button></form></td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
