{% extends 'base.html' %}
{% block content %}
<h3>New Container Job</h3>
<form method="post" enctype="multipart/form-data" class="row g-3">
  <div class="col-md-4">
    <label class="form-label">Site</label>
    <select name="site_id" class="form-select" required>
      {% for s in sites %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Pay period (optional)</label>
    <select name="pay_period_id" class="form-select">
      <option value="">--</option>
      {% for p in pay_periods %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
    </select>
  </div>
  <div class="col-md-4"><label class="form-label">Job date</label><input type="date" name="job_date" class="form-control" required /></div>
  <div class="col-md-6"><label class="form-label">Container reference</label><input name="container_ref" class="form-control" required /></div>
  <div class="col-md-6"><label class="form-label">Containers unloaded</label><input type="number" min="1" name="containers_unloaded" class="form-control" required /></div>
  <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control"></textarea></div>
  <div class="col-12"><label class="form-label">Issue notes (optional)</label><textarea name="issue_notes" class="form-control"></textarea></div>
  <div class="col-12"><label class="form-label">Issue photo (optional)</label><input type="file" name="issue_photo" class="form-control" /></div>
  <div class="col-12"><button class="btn btn-primary">Submit</button></div>
</form>
{% endblock %}
